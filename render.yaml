services:
  - type: web
    name: shl-assessment-agent
    env: docker
    region: ohio
    plan: free
    branch: main
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-specdec
      - key: PORT
        value: 8000
